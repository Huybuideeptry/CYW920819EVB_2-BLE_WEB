<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYW20819 BLE Control</title>

<style>

body{
    margin:0;
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#111;
    font-family:Arial;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

button{
    width:220px;
    height:220px;

    border:none;
    border-radius:50%;

    font-size:28px;
    font-weight:bold;

    cursor:pointer;

    background:#2ecc71;
    color:white;

    box-shadow:0 0 25px rgba(46,204,113,0.5);

    transition:0.2s;
}

button:active{
    transform:scale(0.96);
}

.status{
    color:white;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

    <button id="mainBtn">CONNECT</button>

    <div class="status" id="status">
        Disconnected
    </div>

</div>

<script>

const SERVICE_UUID =
'2320567c-05cf-6eb4-c341-772851827e1b';

const CONFIG_UUID =
'1a89074a-2f3b-7ea6-8144-3ff9a8f29b5e';

let bleDevice;
let configChar;
let ledState = false;

const button = document.getElementById("mainBtn");
const statusText = document.getElementById("status");

button.addEventListener("click", async () => {

    try{

        if(!bleDevice)
        {
            statusText.innerText = "Connecting...";

            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices:true,
                optionalServices:[SERVICE_UUID]
            });

            const server = await bleDevice.gatt.connect();

            const service =
            await server.getPrimaryService(SERVICE_UUID);

            configChar =
            await service.getCharacteristic(CONFIG_UUID);

            statusText.innerText = "Connected";

            button.innerText = "LED OFF";

            return;
        }

        ledState = !ledState;

        if(ledState)
        {
            await configChar.writeValue(
                Uint8Array.of(1)
            );

            button.style.background = "#e74c3c";
            button.innerText = "LED ON";
        }
        else
        {
            await configChar.writeValue(
                Uint8Array.of(0)
            );

            button.style.background = "#2ecc71";
            button.innerText = "LED OFF";
        }

    }
    catch(err)
    {
        console.log(err);

        statusText.innerText = "Error";
    }

});

</script>

</body>
</html>
