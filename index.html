<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYW20819 Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111827;
    color:white;
    min-height:100vh;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.status{
    padding:10px 18px;
    border-radius:20px;
    background:#374151;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:24px;
    padding:22px;
    box-shadow:0 0 18px rgba(0,0,0,0.3);
}

.card-title{
    font-size:16px;
    color:#9ca3af;
    margin-bottom:20px;
}

.big-value{
    font-size:42px;
    font-weight:bold;
}

.unit{
    font-size:20px;
    color:#9ca3af;
}

.toggle{
    width:100%;
    height:70px;
    border:none;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.toggle-on{
    background:#22c55e;
    color:white;
}

.toggle-off{
    background:#374151;
    color:white;
}

.connect-btn{
    width:100%;
    height:70px;
    border:none;
    border-radius:20px;
    background:#3b82f6;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.slider{
    width:100%;
    margin-top:15px;
}

.slider-value{
    margin-top:10px;
    font-size:24px;
}

</style>
</head>

<body>

<div class="header">
    <div class="title">CYW20819 Dashboard</div>
    <div class="status" id="status">
        Disconnected
    </div>
</div>

<div class="grid">

    <div class="card">
        <div class="card-title">BLE Connection</div>

        <button class="connect-btn"
                onclick="connectBLE()">
            CONNECT
        </button>
    </div>

    <div class="card">
        <div class="card-title">LED Control</div>

        <button id="ledBtn"
                class="toggle toggle-off"
                onclick="toggleLED()">
            OFF
        </button>
    </div>

    <div class="card">
        <div class="card-title">Temperature</div>

        <div class="big-value">
            <span id="temp">26</span>
            <span class="unit">°C</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">PWM Output</div>

        <input type="range"
               min="0"
               max="255"
               value="120"
               class="slider"
               id="pwmSlider">

        <div class="slider-value">
            <span id="pwmValue">120</span>
        </div>
    </div>

</div>

<script>

const SERVICE_UUID =
'2320567c-05cf-6eb4-c341-772851827e1b';

const CONFIG_UUID =
'1a89074a-2f3b-7ea6-8144-3ff9a8f29b5e';

let bleDevice;
let configChar;
let ledState = false;

const statusText =
document.getElementById("status");

const ledBtn =
document.getElementById("ledBtn");

async function connectBLE()
{
    try
    {
        statusText.innerText = "Scanning...";

        bleDevice =
        await navigator.bluetooth.requestDevice({

            filters:[
                {
                    services:[SERVICE_UUID]
                }
            ]

        });

        const server =
        await bleDevice.gatt.connect();

        const service =
        await server.getPrimaryService(
            SERVICE_UUID
        );

        configChar =
        await service.getCharacteristic(
            CONFIG_UUID
        );

        statusText.innerText = "Connected";

        bleDevice.addEventListener(
            'gattserverdisconnected',
            onDisconnected
        );
    }
    catch(err)
    {
        console.log(err);
        statusText.innerText = "Error";
    }
}

function onDisconnected()
{
    statusText.innerText = "Disconnected";
}

async function toggleLED()
{
    if(!configChar) return;

    ledState = !ledState;

    if(ledState)
    {
        await configChar.writeValue(
            Uint8Array.of(1)
        );

        ledBtn.innerText = "ON";
        ledBtn.classList.remove("toggle-off");
        ledBtn.classList.add("toggle-on");
    }
    else
    {
        await configChar.writeValue(
            Uint8Array.of(0)
        );

        ledBtn.innerText = "OFF";
        ledBtn.classList.remove("toggle-on");
        ledBtn.classList.add("toggle-off");
    }
}

const pwmSlider =
document.getElementById("pwmSlider");

const pwmValue =
document.getElementById("pwmValue");

pwmSlider.addEventListener("input", () => {

    pwmValue.innerText = pwmSlider.value;

    // sau này gửi BLE PWM ở đây

});

</script>

</body>
</html>
