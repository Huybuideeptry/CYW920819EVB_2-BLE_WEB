<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Home BLE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111827;
    color:white;
    min-height:100vh;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.status{
    padding:10px 18px;
    border-radius:20px;
    background:#374151;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:24px;
    padding:22px;
    box-shadow:0 0 18px rgba(0,0,0,0.3);
}

.card-title{
    font-size:16px;
    color:#9ca3af;
    margin-bottom:20px;
}

.toggle{
    width:100%;
    height:80px;
    border:none;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.toggle-on{
    background:#22c55e;
    color:white;
}

.toggle-off{
    background:#374151;
    color:white;
}

.connect-btn{
    width:100%;
    height:70px;
    border:none;
    border-radius:20px;
    background:#3b82f6;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.big-value{
    font-size:42px;
    font-weight:bold;
}

.unit{
    font-size:20px;
    color:#9ca3af;
}

.sensor-icon{
    font-size:42px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="title">Smart Home BLE</div>

    <div class="status" id="status">
        Disconnected
    </div>
</div>

<div class="grid">

    <div class="card">
        <div class="card-title">BLE Connection</div>

        <button class="connect-btn"
                onclick="connectBLE()">
            CONNECT
        </button>
    </div>

    <div class="card">
        <div class="card-title">Phòng ngủ</div>

        <button id="bedroomBtn"
                class="toggle toggle-off"
                onclick="toggleBedroom()">
            OFF
        </button>
    </div>

    <div class="card">
        <div class="card-title">Phòng bếp</div>

        <button id="kitchenBtn"
                class="toggle toggle-off"
                onclick="toggleKitchen()">
            OFF
        </button>
    </div>

    <div class="card">
        <div class="card-title">Nhiệt độ</div>
        <div class="big-value">
            <span id="temp">26</span>
            <span class="unit">°C</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Độ ẩm</div>
        <div class="big-value">
            <span id="humidity">65</span>
            <span class="unit">%</span>
        </div>
    </div>

</div>

<script>

const SERVICE_UUID =
'1b7e8251-2877-41c3-b46e-cf057c562023';

const CONFIG_UUID =
'5e9bf2a8-f93f-4481-a67e-3b2f4a07891a';

let bleDevice;
let configChar;

let bedroomState = false;
let kitchenState = false;

const statusText =
document.getElementById("status");

const bedroomBtn =
document.getElementById("bedroomBtn");

const kitchenBtn =
document.getElementById("kitchenBtn");

async function connectBLE()
{
    try
    {
        statusText.innerText = "Scanning...";

        bleDevice =
        await navigator.bluetooth.requestDevice({

            filters:[
                {
                    services:[SERVICE_UUID]
                }
            ]

        });

        const server =
        await bleDevice.gatt.connect();

        const service =
        await server.getPrimaryService(
            SERVICE_UUID
        );

        configChar =
        await service.getCharacteristic(
            CONFIG_UUID
        );

        statusText.innerText = "Connected";

        bleDevice.addEventListener(
            'gattserverdisconnected',
            onDisconnected
        );

        // demo sensor update
        startFakeSensor();
    }
    catch(err)
    {
        console.log(err);
        statusText.innerText = "Error";
    }
}

function onDisconnected()
{
    statusText.innerText = "Disconnected";
}

async function toggleBedroom()
{
    if(!configChar) return;

    bedroomState = !bedroomState;

    if(bedroomState)
    {
        await configChar.writeValue(
            Uint8Array.of(1)
        );

        bedroomBtn.innerText = "ON";
        bedroomBtn.classList.remove("toggle-off");
        bedroomBtn.classList.add("toggle-on");
    }
    else
    {
        await configChar.writeValue(
            Uint8Array.of(0)
        );

        bedroomBtn.innerText = "OFF";
        bedroomBtn.classList.remove("toggle-on");
        bedroomBtn.classList.add("toggle-off");
    }
}

async function toggleKitchen()
{
    if(!configChar) return;

    kitchenState = !kitchenState;

    if(kitchenState)
    {
        await configChar.writeValue(
            Uint8Array.of(2)
        );

        kitchenBtn.innerText = "ON";
        kitchenBtn.classList.remove("toggle-off");
        kitchenBtn.classList.add("toggle-on");
    }
    else
    {
        await configChar.writeValue(
            Uint8Array.of(3)
        );

        kitchenBtn.innerText = "OFF";
        kitchenBtn.classList.remove("toggle-on");
        kitchenBtn.classList.add("toggle-off");
    }
}

// demo data
function startFakeSensor()
{
    setInterval(() => {

        let temp =
        25 + Math.floor(Math.random()*5);

        let hum =
        60 + Math.floor(Math.random()*10);

        document.getElementById("temp")
        .innerText = temp;

        document.getElementById("humidity")
        .innerText = hum;

    }, 2000);
}

</script>

</body>
</html>
