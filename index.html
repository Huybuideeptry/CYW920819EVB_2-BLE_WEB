<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Home BLE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111827;
    color:white;
    min-height:100vh;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.status{
    padding:10px 18px;
    border-radius:20px;
    background:#374151;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:24px;
    padding:22px;
    box-shadow:0 0 18px rgba(0,0,0,0.3);
}

.card-title{
    font-size:16px;
    color:#9ca3af;
    margin-bottom:20px;
}

.toggle{
    width:100%;
    height:80px;
    border:none;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.toggle-on{
    background:#22c55e;
    color:white;
}

.toggle-off{
    background:#374151;
    color:white;
}

.connect-btn{
    width:100%;
    height:70px;
    border:none;
    border-radius:20px;
    background:#3b82f6;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.big-value{
    font-size:42px;
    font-weight:bold;
}

.unit{
    font-size:20px;
    color:#9ca3af;
}

.sensor-icon{
    font-size:42px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="title">Smart Home BLE</div>

    <div class="status" id="status">
        Disconnected
    </div>
</div>

<div class="grid">

    <div class="card">
        <div class="card-title">BLE Connection</div>

        <button class="connect-btn"
                onclick="connectBLE()">
            CONNECT
        </button>
    </div>

    <div class="card">
        <div class="card-title">Phòng ngủ</div>

        <button id="bedroomBtn"
                class="toggle toggle-off"
                onclick="toggleBedroom()">
            OFF
        </button>
    </div>

    <div class="card">
        <div class="card-title">Phòng bếp</div>

        <button id="kitchenBtn"
                class="toggle toggle-off"
                onclick="toggleKitchen()">
            OFF
        </button>
    </div>

    <div class="card">
    <div class="card-title">Phòng khách</div>

    <button id="livingBtn"
            class="toggle toggle-off"
            onclick="toggleLiving()">
        OFF
    </button>
</div>

<div class="card">
    <div class="card-title">Toilet</div>

    <button id="toiletBtn"
            class="toggle toggle-off"
            onclick="toggleToilet()">
        OFF
    </button>
</div>
    
    <div class="card">
        <div class="card-title">Nhiệt độ</div>
        <div class="big-value">
            <span id="temp">26</span>
            <span class="unit">°C</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Độ ẩm</div>
        <div class="big-value">
            <span id="humidity">65</span>
            <span class="unit">%</span>
        </div>
    </div>

</div>

<script>

const SERVICE_UUID = '1b7e8251-2877-41c3-b46e-cf057c562023';
const NOTIFY_UUID  = '8ac32d3f-5cb9-4d44-bec2-ee689169f626';
const CONFIG_UUID  = '5e9bf2a8-f93f-4481-a67e-3b2f4a07891a';

let bleDevice;
let configChar;

let bedroomState = false;
let kitchenState = false;
let livingState  = false;
let toiletState  = false;

const livingBtn  = document.getElementById("livingBtn");
const toiletBtn  = document.getElementById("toiletBtn");
const statusText = document.getElementById("status");
const bedroomBtn = document.getElementById("bedroomBtn");
const kitchenBtn = document.getElementById("kitchenBtn");

async function connectBLE() {
    try {
        statusText.innerText = "Scanning...";

        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }]
        });

        const server  = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        configChar = await service.getCharacteristic(CONFIG_UUID);

        const notifyChar = await service.getCharacteristic(NOTIFY_UUID);
        await notifyChar.startNotifications();  // FIX 1: subscribe notification

        notifyChar.addEventListener('characteristicvaluechanged', event => {  // FIX 2: đúng variable
            let value = new TextDecoder().decode(event.target.value);
            console.log("BLE:", value);

            let match = value.match(/T:(\d+)C H:(\d+)%/);
            if(match) {
                document.getElementById("temp").innerText     = match[1];
                document.getElementById("humidity").innerText = match[2];
            }
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
        statusText.innerText = "Connected";  // FIX 3: status rõ hơn
    }
    catch(err) {
        console.log(err);
        statusText.innerText = "Error: " + err.message;
    }
}

function onDisconnected() {
    statusText.innerText = "Disconnected";
}

async function toggleLiving() {
    if(!configChar) return;
    livingState = !livingState;
    await configChar.writeValue(Uint8Array.of(3, livingState ? 1 : 0));
    livingBtn.innerText = livingState ? "ON" : "OFF";
    livingBtn.className = "toggle " + (livingState ? "toggle-on" : "toggle-off");
}

async function toggleToilet() {
    if(!configChar) return;
    toiletState = !toiletState;
    await configChar.writeValue(Uint8Array.of(4, toiletState ? 1 : 0));
    toiletBtn.innerText = toiletState ? "ON" : "OFF";
    toiletBtn.className = "toggle " + (toiletState ? "toggle-on" : "toggle-off");
}

async function toggleBedroom() {
    if(!configChar) return;
    bedroomState = !bedroomState;
    await configChar.writeValue(Uint8Array.of(1, bedroomState ? 1 : 0));
    bedroomBtn.innerText = bedroomState ? "ON" : "OFF";
    bedroomBtn.className = "toggle " + (bedroomState ? "toggle-on" : "toggle-off");
}

async function toggleKitchen() {
    if(!configChar) return;
    kitchenState = !kitchenState;
    await configChar.writeValue(Uint8Array.of(2, kitchenState ? 1 : 0));
    kitchenBtn.innerText = kitchenState ? "ON" : "OFF";
    kitchenBtn.className = "toggle " + (kitchenState ? "toggle-on" : "toggle-off");
}

</script>

</body>
</html>
